environment: production
environmentCode:
name: ffc-pay-processing
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-processing

labels:
  component: service

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-processing-config-map

containerSecret:
  name: ffc-pay-processing
  type: Opaque

deployment:
  minReplicas: 1
  maxReplicas: 1
  cpuThreshold: 50
  memoryThreshold: 70
  priorityClassName: high

container:
  requestMemory: 180Mi
  requestCpu: 200m
  limitMemory: 1000Mi
  limitCpu: 1000m
  port: 3008
  messageQueueHost: namespace.servicebus.windows.net
  processingTopicAddress: ffc-pay-processing
  processingSubscriptionAddress: ffc-pay-processing
  acknowledgementTopicAddress: ffc-pay-acknowledgement
  acknowledgementSubscriptionAddress: ffc-pay-processing
  returnTopicAddress: ffc-pay-return
  returnSubscriptionAddress: ffc-pay-processing
  paymentSubmitTopicAddress: ffc-pay-submit
  debtTopicAddress: ffc-pay-debt-data
  qcTopicAddress: ffc-pay-debt-data-response
  qcSubscriptionAddress: ffc-pay-processing
  useManualLedgerCheck: false
  manualCheckTopicAddress: ffc-pay-manual-check-data
  qcManualCheckTopicAddress: ffc-pay-quality-check
  qcManualCheckSubscriptionAddress: ffc-pay-processing
  xbTopicAddress: ffc-pay-xb
  xbResponseTopicAddress: ffc-pay-xb-response
  xbResponseSubscriptionAddress: ffc-pay-processing
  eventsTopicAddress: ffc-pay-events
  autoHoldRecovery: false
  handleSchemeClosures: true
  processingInterval: 1000
  processingCap: 5000
  paymentPublishingInterval: 1000
  processingActive: true
  processingSubscriptionMaxConcurrentCalls: 1

postgresService:
  postgresDb: ffc_pay_processing
  postgresqlHost: ffc-pay-processing-postgres
  postgresPort: 5432
  postgresSchema: public
  postgresUser: postgres
  logging: false

readinessProbe:
  path: /healthy
  port: 3008
  initialDelaySeconds: 60
  periodSeconds: 120
  failureThreshold: 5
  timeoutSeconds: 30

livenessProbe:
  path: /healthz
  port: 3008
  initialDelaySeconds: 70
  periodSeconds: 120
  failureThreshold: 5
  timeoutSeconds: 30

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-processing
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTIONSTRING # the secret key in the Kubernetes secret and use in the application